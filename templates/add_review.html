<!DOCTYPE html>
<html lang="en">
<head>
    <title>Add Review - Cartiele</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <script src="{{ url_for('static', filename='js/sweetalert2/dist/sweetalert2.all.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>


    <style>
        :root {
            --primary: #4f46e5;
            --primary-dark: #4338ca;
            --primary-light: #e0e7ff;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --light: #f8fafc;
            --dark: #1e293b;
            --gray: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
            --shadow-hover: 0 8px 24px rgba(0, 0, 0, 0.1);
            --radius: 12px;
            --transition: all 0.3s ease;
        }

        body {
            background: linear-gradient(135deg, #f9fafb 0%, #f1f5f9 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--dark);
            min-height: 100vh;
            padding: 20px;
        }

        .review-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header-section {
            text-align: center;
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .header-title {
            color: var(--primary);
            font-weight: 700;
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
        }

        .header-subtitle {
            color: var(--gray);
            font-size: 0.95rem;
        }

        .back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            background: white;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--primary);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .back-button:hover {
            background: var(--primary-light);
            transform: translateX(-2px);
            text-decoration: none;
        }

        /* Review Form Card */
        .review-card {
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            padding: 2rem;
            transition: var(--transition);
        }

        .review-card:hover {
            box-shadow: var(--shadow-hover);
        }

        .form-label {
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-label i {
            color: var(--primary);
        }

        .form-control, .form-select {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            transition: var(--transition);
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        textarea.form-control {
            min-height: 120px;
            resize: vertical;
        }

        /* Star Rating Styling */
        .rating-option {
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 0.5rem;
            transition: var(--transition);
            cursor: pointer;
        }

        .rating-option:hover {
            border-color: var(--primary);
            background: var(--primary-light);
        }

        .form-select option {
            padding: 0.75rem;
        }

        .stars-preview {
            color: #fbbf24;
            font-size: 1.2rem;
            margin-right: 0.5rem;
        }

        .rating-text {
            color: var(--gray);
            font-size: 0.9rem;
        }

        .rating-excellent { color: #10b981; }
        .rating-good { color: #3b82f6; }
        .rating-average { color: #f59e0b; }
        .rating-fair { color: #f97316; }
        .rating-poor { color: #ef4444; }

        /* File Upload */
        .file-upload-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-upload-button {
            background: var(--primary);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transition);
        }

        .file-upload-button:hover {
            background: var(--primary-dark);
        }

        .file-upload-input {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-info {
            margin-top: 0.5rem;
            font-size: 0.85rem;
            color: var(--gray);
        }

        /* Submit Button */
        .btn-submit {
            background: linear-gradient(135deg, var(--success) 0%, #059669 100%);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            width: 100%;
            margin-top: 1.5rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.3);
        }

        /* Required Field */
        .required-field::after {
            content: " *";
            color: var(--danger);
        }

        /* Media Types */
        .media-types {
            display: flex;
            gap: 1rem;
            margin-top: 0.5rem;
        }

        .media-type-tag {
            background: var(--primary-light);
            color: var(--primary);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
        }

        @media (max-width: 768px) {
            .review-container {
                padding: 10px;
            }
            
            .back-button {
                top: 15px;
                left: 15px;
                padding: 6px 12px;
                font-size: 0.85rem;
            }
            
            .header-title {
                font-size: 1.5rem;
            }
            
            .review-card {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Back Button -->
    <a href="{{ url_for('profile') }}" class="back-button">
        <i class="bi bi-arrow-left"></i> Back to Profile
    </a>

    <div class="review-container">
        <!-- Header -->
        <div class="header-section">
            <h1 class="header-title">Add Your Review</h1>
            <p class="header-subtitle">Share your experience with this product</p>
        </div>

        <!-- Review Form -->
     <form method="POST" enctype="multipart/form-data" style="max-width:500px">
    <label class="form-label">Rating</label>
    <select name="rating" class="form-select" required>
        <option value="5">⭐⭐⭐⭐⭐ (Excellent)</option>
        <option value="4">⭐⭐⭐⭐</option>
        <option value="3">⭐⭐⭐</option>
        <option value="2">⭐⭐</option>
        <option value="1">⭐</option>
    </select>

    <label class="form-label mt-3">Comment</label>
    <textarea name="comment" class="form-control" rows="4" required></textarea>

    <label class="form-label mt-3">Upload Image or Video (optional)</label>
    <input type="file" name="media" class="form-control" accept="image/*,video/mp4,video/mov,video/avi">
   <button type="submit" class="btn-submit">
                <i class="bi bi-send-check"></i> Submit Review
            </button>
</form>
       
    </div>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        const mediaInput = document.getElementById('mediaInput');
        const fileLabel = document.getElementById('fileLabel');

        mediaInput.addEventListener('change', function () {
            if (this.files.length > 0) {
                fileLabel.textContent = this.files[0].name;
                fileLabel.parentElement.style.background = 'var(--success)';
            }
        });
    </script>
</body>
</html>

    <script>
        // File upload preview
        document.querySelector('input[name="media"]').addEventListener('change', function(e) {
            const fileName = this.files[0]?.name;
            if (fileName) {
                const uploadButton = document.querySelector('.file-upload-button');
                uploadButton.innerHTML = `
                    <i class="bi bi-check-circle"></i> ${fileName}
                    <input type="file" name="media" class="file-upload-input" 
                           accept="image/*,video/mp4,video/mov,video/avi">
                `;
                uploadButton.style.background = 'var(--success)';
            }
        });

        // Form submission handler
        document.querySelector('form').addEventListener('submit', function(e) {
            const rating = document.querySelector('select[name="rating"]').value;
            const comment = document.querySelector('textarea[name="comment"]').value;
            
            if (!rating || !comment.trim()) {
                e.preventDefault();
                Swal.fire({
                    icon: 'warning',
                    title: 'Missing Information',
                    text: 'Please provide both rating and review comment.',
                    confirmButtonText: 'OK',
                    confirmButtonColor: '#4f46e5'
                });
                return;
            }
            
            // Optional: Show loading state
            const submitBtn = document.querySelector('.btn-submit');
            submitBtn.innerHTML = '<i class="bi bi-hourglass-split"></i> Submitting...';
            submitBtn.disabled = true;
        });

        // Success message handling
        document.addEventListener('DOMContentLoaded', () => {
            {% if success %}
                Swal.fire({
                    title: '🎉 Review Submitted!',
                    html: `
                        <div style="text-align: center; padding: 1rem;">
                            <div style="font-size: 4rem; color: #10b981; margin: 1rem 0;">✅</div>
                            <h3 style="color: #4f46e5; margin-bottom: 0.5rem;">Thank You!</h3>
                            <p style="color: #64748b; margin-bottom: 1.5rem;">
                                Your review has been submitted successfully.
                            </p>
                        </div>
                    `,
                    icon: 'success',
                    confirmButtonText: 'Back to Profile',
                    confirmButtonColor: '#4f46e5',
                    timer: 3000,
                    timerProgressBar: true
                }).then(() => {
                    window.location.href = "{{ url_for('profile') }}";
                });
            {% endif %}
        });

        // Update rating display on change
        document.querySelector('select[name="rating"]').addEventListener('change', function() {
            const selectedOption = this.options[this.selectedIndex];
            const ratingText = selectedOption.querySelector('.rating-text').textContent;
            const stars = selectedOption.querySelector('.stars-preview').textContent;
            
            // You could add some visual feedback here
            console.log(`Selected rating: ${stars} ${ratingText}`);
        });
    </script>
</body>
</html>
