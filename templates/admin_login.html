<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>

<!-- Offline Bootstrap CSS -->
<link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
<script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>

<!-- Offline SweetAlert2 -->
<script src="{{ url_for('static', filename='js/sweetalert2/dist/sweetalert2.all.min.js') }}"></script>

<style>
:root {
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --secondary: #64748b;
    --dark: #0f172a;
    --light: #f8fafc;
    --gray-100: #f1f5f9;
    --gray-200: #e2e8f0;
    --gray-300: #cbd5e1;
    --gray-600: #475569;
    --border: #e2e8f0;
    --success: #10b981;
    --error: #ef4444;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.12);
    --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
    --shadow-lg: 0 10px 25px -5px rgba(0,0,0,0.08);
    --shadow-xl: 0 20px 40px -10px rgba(0,0,0,0.12);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 50%, #f8fafc 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    color: var(--dark);
}

.login-container {
    width: 100%;
    max-width: 900px;
}

/* Card */
.login-card {
    background: white;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: var(--shadow-xl);
    display: flex;
    min-height: 580px;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.login-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15);
}

/* Left Panel - Form */
.login-form-section {
    flex: 1;
    padding: 60px 50px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
}

.login-header {
    margin-bottom: 40px;
}

.login-header h1 {
    font-size: 2.25rem;
    font-weight: 700;
    color: var(--dark);
    margin-bottom: 8px;
    background: linear-gradient(90deg, var(--primary), var(--primary-dark));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.login-header p {
    color: var(--gray-600);
    font-size: 1rem;
    line-height: 1.5;
}

/* Form Elements */
.form-group {
    margin-bottom: 24px;
}

.form-label {
    display: block;
    font-size: 0.875rem;
    font-weight: 600;
    color: var(--dark);
    margin-bottom: 8px;
}

.input-group {
    position: relative;
}

.form-control {
    width: 100%;
    height: 52px;
    padding: 0 16px;
    font-size: 0.95rem;
    border: 2px solid var(--gray-200);
    border-radius: 12px;
    background: var(--light);
    transition: all 0.2s ease;
    color: var(--dark);
}

.form-control:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    background: white;
}

.form-control::placeholder {
    color: var(--gray-300);
}

.input-icon {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--gray-400);
}

/* Login Button */
.btn-login {
    width: 100%;
    height: 52px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 8px;
}

.btn-login:hover {
    background: linear-gradient(135deg, var(--primary-dark), #1e40af);
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
}

.btn-login:active {
    transform: translateY(0);
}

/* Right Panel - Brand */
.brand-section {
    flex: 0 0 40%;
    background: linear-gradient(135deg, var(--primary-dark), #1e40af);
    padding: 60px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: white;
    position: relative;
    overflow: hidden;
}

.brand-section::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
    background-size: 30px 30px;
    opacity: 0.3;
}

.brand-logo {
    width: 100px;
    height: 100px;
    margin-bottom: 30px;
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 20px;
    backdrop-filter: blur(10px);
    position: relative;
    z-index: 1;
}

.brand-logo img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

.brand-content {
    position: relative;
    z-index: 1;
}

.brand-content h3 {
    font-size: 1.75rem;
    font-weight: 700;
    margin-bottom: 12px;
    letter-spacing: -0.5px;
}

.brand-content p {
    font-size: 0.95rem;
    opacity: 0.9;
    line-height: 1.5;
    max-width: 280px;
}

/* Decorative Elements */
.decorative-circle {
    position: absolute;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
}

.circle-1 {
    width: 120px;
    height: 120px;
    top: -60px;
    right: -60px;
}

.circle-2 {
    width: 80px;
    height: 80px;
    bottom: -40px;
    left: -40px;
}

/* Responsive Design */
@media (max-width: 992px) {
    .login-card {
        flex-direction: column;
        max-width: 500px;
        margin: 0 auto;
    }
    
    .login-form-section {
        padding: 50px 40px;
    }
    
    .brand-section {
        display: none;
    }
    
    .login-header h1 {
        font-size: 2rem;
    }
}

@media (max-width: 576px) {
    .login-form-section {
        padding: 40px 30px;
    }
    
    .login-header h1 {
        font-size: 1.75rem;
    }
    
    .login-header p {
        font-size: 0.9rem;
    }
}

/* Loading State */
.btn-login.loading {
    opacity: 0.8;
    cursor: not-allowed;
}

.btn-login.loading::after {
    content: '';
    width: 16px;
    height: 16px;
    border: 2px solid white;
    border-radius: 50%;
    border-top-color: transparent;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* Focus States */
.form-control:focus-within {
    border-color: var(--primary);
}

/* Animation */
@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.login-form-section > * {
    animation: fadeInUp 0.6s ease-out forwards;
    opacity: 0;
}

.login-header { animation-delay: 0.1s; }
.form-group:first-child { animation-delay: 0.2s; }
.form-group:last-child { animation-delay: 0.3s; }
.btn-login { animation-delay: 0.4s; }
</style>
</head>

<body>

<div class="login-container">
    <div class="login-card">
        
        <!-- Left Panel - Login Form -->
        <div class="login-form-section">
            <div class="decorative-circle circle-1"></div>
            <div class="decorative-circle circle-2"></div>
            
            <div class="login-header">
                <h1>Admin Portal</h1>
            </div>

            <form method="POST">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <div class="input-group">
                        <input type="text" 
                               name="username" 
                               class="form-control" 
                               placeholder="Enter your username"
                               required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <input type="password" 
                               name="password" 
                               class="form-control" 
                               placeholder="Enter your password"
                               required>
                    </div>
                </div>

                <button type="submit" class="btn-login">
                    <span>Sign In</span>
                </button>
            </form>
        </div>

        <!-- Right Panel - Brand Section -->
        <div class="brand-section">
                <img src="{{ url_for('static', filename='images/logo-white.png') }}" alt="Brand Logo">
            </div>
           
                
            
        </div>
    </div>
</div>

<!-- SweetAlert2 Flash Messages (LOGIC UNCHANGED) -->
<script>
document.addEventListener('DOMContentLoaded', function () {
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                {% if category == 'error' %}
                Swal.fire({
                    icon: 'error',
                    title: 'Login Failed',
                    text: '{{ message | escape }}',
                    confirmButtonColor: '#2563eb',
                    background: '#fff',
                    color: '#0f172a',
                    showCloseButton: true,
                    customClass: {
                        confirmButton: 'swal2-confirm'
                    }
                });
                {% endif %}
            {% endfor %}
        {% endif %}
    {% endwith %}
});
</script>

</body>
</html>
